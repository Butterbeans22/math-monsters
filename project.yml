name: MathMonsters
options:
  bundleIdPrefix: com.butterbeans22
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  MathMonsters:
    type: application
    platform: iOS
    sources:
      - MathMonsters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.butterbeans22.MathMonsters
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: MathMonsters/Info.plist
        DEVELOPMENT_TEAM: A62XZ22TL6
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "iPhone Developer"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
        "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": NO
    info:
      path: MathMonsters/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
