name: MathMonsters
options:
  bundleIdPrefix: com.butterbeans22
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  MathMonsters:
    type: application
    platform: iOS
    sources:
      - MathMonsters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.butterbeans22.MathMonsters
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: MathMonsters/Info.plist
    info:
      path: MathMonsters/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
